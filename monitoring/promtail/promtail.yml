server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # --------------------------------------------------------------------------
  # Scrape all service log files from the mounted host logs directory.
  # Expected layout: /var/log/app/<service-name>/<service-name>.log
  # --------------------------------------------------------------------------
  - job_name: app_services
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_services
          __path__: /var/log/app/**/*.log
          # The Go gateway emits flat slog JSON (not Loguru's nested shape); it is
          # parsed by the dedicated `gateway` job below, so exclude it here.
          __path_exclude__: /var/log/app/gateway/*.log

    pipeline_stages:
      # Parse the JSON log lines emitted by Loguru with serialize=True
      - json:
          expressions:
            level: record.level.name
            service: record.extra.service
            status: record.extra.status
            queue: record.extra.queue
            handler: record.extra.handler
            trace_id: record.extra.trace_id
            span_id: record.extra.span_id
            trace_sampled: record.extra.trace_sampled
            message_id: record.extra.message_id
            job_id: record.extra.job_id
            message: record.message
            correlation_id: record.extra.correlation_id
            timestamp: record.time.timestamp

      # Promote parsed fields to Loki labels
      - labels:
          level:
          service:
          status:
          queue:
          handler:
          trace_sampled:

      # Use the log record's own timestamp (epoch float) as the Loki timestamp
      - timestamp:
          source: timestamp
          format: Unix

      # Drop health check poll noise from Loki to keep log volume down
      - drop:
          source: message
          expression: "GET /health"

  # --------------------------------------------------------------------------
  # Go gateway — flat slog JSON (keys: level, msg, time, service, status,
  # correlation_id, trace_id, route, ...). Different shape from the Loguru
  # services above, so it gets its own pipeline.
  # --------------------------------------------------------------------------
  - job_name: gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: gateway
          __path__: /var/log/app/gateway/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            status: status
            message: msg
            correlation_id: correlation_id
            trace_id: trace_id
            route: route
            timestamp: time
      - labels:
          level:
          service:
          status:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - drop:
          source: message
          expression: "GET /health"
