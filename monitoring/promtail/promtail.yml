server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # --------------------------------------------------------------------------
  # Scrape all service log files from the mounted host logs directory.
  # Expected layout: /var/log/app/<service-name>/<service-name>.log
  # --------------------------------------------------------------------------
  - job_name: app_services
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_services
          __path__: /var/log/app/**/*.log

    pipeline_stages:
      # Parse the JSON log lines emitted by Loguru with serialize=True
      - json:
          expressions:
            level: record.level.name
            service: record.extra.service
            status: record.extra.status
            queue: record.extra.queue
            handler: record.extra.handler
            trace_id: record.extra.trace_id
            span_id: record.extra.span_id
            trace_sampled: record.extra.trace_sampled
            message_id: record.extra.message_id
            job_id: record.extra.job_id
            message: record.message
            correlation_id: record.extra.correlation_id
            timestamp: record.time.timestamp

      # Promote parsed fields to Loki labels
      - labels:
          level:
          service:
          status:
          queue:
          handler:
          trace_sampled:

      # Use the log record's own timestamp (epoch float) as the Loki timestamp
      - timestamp:
          source: timestamp
          format: Unix

      # Drop health check poll noise from Loki to keep log volume down
      - drop:
          source: message
          expression: "GET /health"
