global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: discord

  routes:
    # Critical alerts repeat more frequently
    - matchers:
        - severity = critical
      repeat_interval: 1h
      receiver: discord

receivers:
  - name: discord
    discord_configs:
      - webhook_url_file: /run/secrets/discord_webhook_url
        title: |
          {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        message: |
          {{ range .Alerts }}
          **Severity:** {{ .Labels.severity }}
          **Summary:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          **Started:** {{ .StartsAt | since }}
          {{ end }}

inhibit_rules:
  # Suppress warning-level alerts when a critical alert fires for the same component
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname"]
