global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: owt

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/services.yml
  - /etc/prometheus/rules/gateway.yml
  - /etc/prometheus/rules/rabbitmq.yml
  - /etc/prometheus/rules/redis.yml
  - /etc/prometheus/rules/infrastructure.yml

scrape_configs:
  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: redis

  # --------------------------------------------------------------------------
  # RabbitMQ
  # --------------------------------------------------------------------------
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: rabbitmq

  # --------------------------------------------------------------------------
  # Headless RPC services + workers — Prometheus metrics on WORKER_METRICS_PORT.
  # (The former HTTP FastAPI services backend/auth/parser/tournament were
  # decommissioned; their dead scrape jobs were removed.)
  # --------------------------------------------------------------------------
  - job_name: parser-svc
    static_configs:
      - targets: ["parser-svc:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: parser-svc

  - job_name: tournament-svc
    static_configs:
      - targets: ["tournament-svc:9103"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: tournament-svc

  - job_name: balancer-svc
    static_configs:
      - targets: ["balancer-svc:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: balancer-svc

  - job_name: discord-worker
    static_configs:
      - targets: ["discord-worker:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: discord-worker

  - job_name: app-svc
    static_configs:
      - targets: ["app-svc:9109"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: app-svc

  - job_name: identity-svc
    static_configs:
      - targets: ["identity-svc:9107"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: identity-svc

  - job_name: analytics-svc
    static_configs:
      - targets: ["analytics-svc:9108"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: analytics-svc

  - job_name: analytics-worker
    static_configs:
      - targets: ["analytics-worker:9106"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: analytics-worker

  # --------------------------------------------------------------------------
  # Gateway (Go edge) — usage metrics on a dedicated internal port
  # --------------------------------------------------------------------------
  - job_name: gateway
    static_configs:
      - targets: ["gateway:9110"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: gateway

  # --------------------------------------------------------------------------
  # Infrastructure: host (node-exporter), containers (cAdvisor), PostgreSQL
  # --------------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: host

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: host

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: postgres

  # --------------------------------------------------------------------------
  # Observability stack internals
  # --------------------------------------------------------------------------
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics
