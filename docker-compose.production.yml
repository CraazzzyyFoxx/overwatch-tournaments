name: owt

services:
  redis:
    image: 'redis/redis-stack:latest'
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  proxy:
    image: teddysun/xray:latest
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./proxy/xray.json:/etc/xray/config.json:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-config", "/etc/xray/config.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  # app-service is headless: served by app-svc (rpc.app.*) behind the gateway.
  # The former HTTP `backend` service was decommissioned.

  # parser-service HTTP decommissioned: parser is now a headless FastStream worker
  # (parser-svc below), serving its domains as typed RPC behind the gateway.
  # The bot uploads logs over RabbitMQ; the SSE log monitor moved to the WS hub.

  # realtime-service decommissioned: WebSockets are now served by the Go gateway
  # (gateway/internal/ws), consuming the same `realtime:*` Redis channels and
  # replaying from `realtime.workspace_event`. External `/api/realtime/*` flows
  # through nginx -> gateway:8080. Service code kept under
  # backend/realtime-service/ as reference (not deployed).

  discord-worker:
    image: registry.craazzzyyfoxx.me/aqt-discord:latest
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: python main.py
    env_file:
      - ./backend/env/common.env
      - ./backend/env/discord.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9100
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./logs/discord-worker:/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

#  twitch:
#    image: registry.craazzzyyfoxx.me/aqt-twitch:latest
#    build:
#      context: ./backend
#      args:
#        APP_PATH: twitch
#    command: uvicorn main:app --host 0.0.0.0 --port 8082 --workers 2 --loop uvloop
#    env_file:
#      - ./backend/env/common.env
#      - ./backend/env/twitch.env
#    depends_on:
#      redis:
#        condition: service_started
#      rabbitmq:
#        condition: service_healthy
#      auth:
#        condition: service_healthy
#    volumes:
#      - ./logs/twitch:/logs
#    networks:
#      - app-network
#    healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 40s
#    restart: always

  # balancer-service HTTP decommissioned: /api/balancer is served by the headless
  # balancer-svc (rpc.balancer.* config/admin/draft/jobs) behind the gateway.
  # The worker also consumes the balancer job queue + runs the draft clock + Rust
  # moo_core. The dead SSE job-stream endpoint was removed (progress flows over the
  # tournament:{id}:balancer WS topic).

  # analytics-service HTTP decommissioned: /api/analytics is served by the headless
  # analytics-svc (rpc.analytics.* reads + job-control) behind the gateway; heavy ML
  # compute stays in analytics-worker (job queues).

  parser-svc:
    image: registry.craazzzyyfoxx.me/aqt-parser:latest
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/parser.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./logs/parser-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  tournament-svc:
    image: registry.craazzzyyfoxx.me/aqt-tournament:latest
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 128M
    build:
      context: ./backend
      args:
        APP_PATH: tournament
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/tournament.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9103
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/tournament-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  # Headless RPC worker replacing the HTTP `backend` behind the gateway.
  app-svc:
    image: registry.craazzzyyfoxx.me/aqt-app:latest
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9109
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./logs/app-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  balancer-svc:
    image: registry.craazzzyyfoxx.me/aqt-balancer:latest
    deploy:
      resources:
        limits:
          cpus: '4.00'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 256M
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/balancer-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  analytics-worker:
    image: registry.craazzzyyfoxx.me/aqt-analytics:latest
    deploy:
      resources:
        limits:
          cpus: '8.00'
          memory: 4G
        reservations:
          cpus: '1.00'
          memory: 1G
    build:
      context: ./backend
      args:
        APP_PATH: analytics
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/analytics.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9106
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/.cache/analytics:/cache/analytics
      - analytics-models:/opt/anak/models
      - ./logs/analytics-worker:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  # Headless RPC face for analytics reads/mutations/job-control (rpc.analytics.*),
  # consumed by the gateway's analytics edge routes. The heavy ML work stays in
  # analytics-worker; this is the light request/reply service (serve_rpc:app).
  analytics-svc:
    image: registry.craazzzyyfoxx.me/aqt-analytics:latest
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    build:
      context: ./backend
      args:
        APP_PATH: analytics
    command: faststream run serve_rpc:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/analytics.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9108
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/analytics-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  frontend:
    image: registry.craazzzyyfoxx.me/frontend:latest
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    build:
      context: ./frontend
      dockerfile: prod.Dockerfile
      args:
        NEXT_PUBLIC_CACHE_POLICY: ${NEXT_PUBLIC_CACHE_POLICY}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SITE_ICON: ${NEXT_PUBLIC_SITE_ICON}
        NEXT_PUBLIC_SITE_FAVICON: ${NEXT_PUBLIC_SITE_FAVICON}
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CACHE_POLICY=${NEXT_PUBLIC_CACHE_POLICY}
      # Single gateway origin: the browser uses relative same-origin paths; only
      # server-side (SSR + route handlers + middleware) fetches need a base.
      - NEXT_INTERNAL_API_URL=${NEXT_INTERNAL_API_URL:-http://gateway:8080}
    depends_on:
      gateway:
        condition: service_started
    volumes:
      - ./logs/frontend:/logs
      # Optional: override the browser favicon at runtime
      # - ./conf/favicon.ico:/app/public/favicon.ico:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

  # ==========================================================================
  # Gateway architecture — part of the DEFAULT stack.
  # The gateway is the single entry point: backend services validate tokens
  # through it (AUTH_SERVICE_URL=http://gateway:8080/api/auth is set on each
  # consumer below) -> RPC -> identity-svc, and the gateway serves /api/auth/*,
  # /api/v1 (typed RPC) + reverse-proxies the rest (parser/analytics/balancer/
  # frontend). nginx is the external edge (Kong removed).
  #   traefik (TLS) -> nginx -> gateway -> RPC -> identity
  # ==========================================================================

  identity-svc:
    image: registry.craazzzyyfoxx.me/aqt-identity:latest
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    build:
      context: ./backend
      args:
        APP_PATH: identity
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/identity.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9107
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./logs/identity-svc:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  gateway:
    image: registry.craazzzyyfoxx.me/aqt-gateway:latest
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/gateway.env
    environment:
      # In prod the frontend is a compose service (dev default points at the host).
      - UPSTREAM_FRONTEND=http://frontend:3000
      # Tag Sentry events as production (the DSN lives in backend/env/gateway.env).
      - SENTRY_ENVIRONMENT=production
    volumes:
      # Structured JSON logs tailed by Promtail into Loki (LOG_FILE=/logs/gateway.log).
      # The distroless image runs as uid 65532 — ./logs/gateway must be writable by
      # it (deploy: mkdir -p logs/gateway && chmod 777 logs/gateway), else the
      # gateway falls back to stdout-only and logs won't reach Loki.
      - ./logs/gateway:/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-svc:
        condition: service_healthy
    networks:
      - app-network
    # No healthcheck: the distroless image has no shell/wget. nginx depends on
    # it with condition: service_started.
    restart: always

  nginx:
    image: nginx:1.31-alpine
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    # Plain-HTTP app entry (sole external edge, replaces Kong): TLS is terminated
    # by Traefik in front of nginx, so no certs/443 here. nginx publishes the
    # host port Traefik already targets (APP_PORT, was Kong's), so no Traefik
    # config change is needed for the cutover.
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

volumes:
  redis-data:
  rabbitmq-data:
  analytics-models:

networks:
  app-network:
    driver: bridge
