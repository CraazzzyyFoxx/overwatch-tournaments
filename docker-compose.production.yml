name: overwatch-tournaments

services:
  redis:
    image: 'redis/redis-stack:latest'
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Monitoring: Prometheus + Alertmanager + Loki + Promtail + Grafana
  # --------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - app-network
    depends_on:
      - redis-exporter
      - rabbitmq-exporter

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/secrets:/run/secrets:ro
      - alertmanager_data:/alertmanager
    networks:
      - app-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    networks:
      - app-network

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:1.0.0-RC19
    restart: unless-stopped
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: "${RABBITMQ_USER:-guest}"
      RABBIT_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBIT_CAPABILITIES: "bert,no_sort"
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "TTY"
      SKIP_QUEUES: "^$"
      INCLUDE_QUEUES: ".*"
    networks:
      - app-network

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - app-network

  tempo:
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - app-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector/config.yml"]
    volumes:
      - ./monitoring/otel/otel-collector.yml:/etc/otel-collector/config.yml:ro
    depends_on:
      - tempo
    networks:
      - app-network

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/app:ro
    networks:
      - app-network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3001}"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/logs.json"
      TEMPO_URL: "${TEMPO_URL:-http://tempo:3200}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - app-network
    depends_on:
      - prometheus
      - loki
      - tempo

  ss-local:
    image: teddysun/xray:latest
    restart: unless-stopped
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./proxy/xray.json:/etc/xray/config.json:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-config", "/etc/xray/config.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.7
    restart: always
    environment:
      - KONG_DATABASE=off
      - KONG_MEM_CACHE_SIZE=64m
      - KONG_NGINX_WORKER_PROCESSES=2
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=off
      - KONG_ADMIN_GUI_LISTEN=off
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_DNS_ORDER=LAST,A,SRV,CNAME
      - KONG_DNS_VALID_TTL=10
      - KONG_DNS_STALE_TTL=0
      - KONG_DNS_NOT_FOUND_TTL=1
      - KONG_DNS_ERROR_TTL=1
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./kong/kong.prod.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      tournament:
        condition: service_healthy
      realtime:
        condition: service_healthy
      analytics:
        condition: service_healthy
      balancer:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${WORKERS_BACKEND:-2} --loop uvloop
    volumes:
      - ./logs/backend:/logs
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ss-local:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

