name: overwatch-tournaments

services:
  redis:
    image: 'redis/redis-stack:latest'
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  ss-local:
    image: teddysun/xray:latest
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./proxy/xray.json:/etc/xray/config.json:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-config", "/etc/xray/config.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.7
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 256M
    restart: always
    environment:
      - KONG_DATABASE=off
      - KONG_MEM_CACHE_SIZE=64m
      - KONG_NGINX_WORKER_PROCESSES=2
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=off
      - KONG_ADMIN_GUI_LISTEN=off
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_DNS_ORDER=LAST,A,SRV,CNAME
      - KONG_DNS_VALID_TTL=10
      - KONG_DNS_STALE_TTL=0
      - KONG_DNS_NOT_FOUND_TTL=1
      - KONG_DNS_ERROR_TTL=1
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./kong/kong.prod.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      tournament:
        condition: service_healthy
      realtime:
        condition: service_healthy
      analytics:
        condition: service_healthy
      balancer:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${WORKERS_BACKEND:-2} --loop uvloop
    volumes:
      - ./logs/backend:/logs
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ss-local:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

