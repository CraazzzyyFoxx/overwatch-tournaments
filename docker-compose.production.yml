      - NEXT_PUBLIC_CACHE_POLICY=${NEXT_PUBLIC_CACHE_POLICY}
      - NEXT_API_URL=${NEXT_API_URL}
      - NEXT_TOURNAMENT_URL=${NEXT_TOURNAMENT_URL:-http://tournament:8004}
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      tournament:
        condition: service_healthy
      realtime:
        condition: service_healthy
      balancer:
        condition: service_healthy
      analytics:
        condition: service_healthy
    volumes:
      - ./logs/frontend:/logs
      # Optional: override the browser favicon at runtime
      # - ./conf/favicon.ico:/app/public/favicon.ico:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

  # ==========================================================================
  # Gateway architecture (Phase 1) — part of the DEFAULT stack.
  # The gateway is primary for everything READY: the backend services validate
  # tokens through it (AUTH_SERVICE_URL=http://gateway:8080/api/auth is set on
  # each consumer below) -> RPC -> identity-svc, and the gateway serves
  # /api/auth/* + proxies the rest. Kong stays the EXTERNAL edge for the
  # frontend/clients until the frontend repoint; then nginx (behind Traefik)
  # takes over the edge.   traefik (TLS) -> nginx -> gateway -> RPC -> identity
  # ==========================================================================

  identity:
    image: registry.craazzzyyfoxx.me/aqt-identity:latest
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    build:
      context: ./backend
      args:
        APP_PATH: identity
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/identity.env
    environment:
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      # Phase 1: validate tokens via the gateway -> identity-svc (overrides common.env).
      - AUTH_SERVICE_URL=http://gateway:8080/api/auth
      - WORKER_METRICS_PORT=9107
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ss-local:
        condition: service_healthy
    volumes:
      - ./logs/identity:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  gateway:
    image: registry.craazzzyyfoxx.me/aqt-gateway:latest
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/gateway.env
    environment:
      # In prod the frontend is a compose service (dev default points at the host).
      - UPSTREAM_FRONTEND=http://frontend:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    networks:
      - app-network
    # No healthcheck: the distroless image has no shell/wget. nginx depends on
    # it with condition: service_started.
    restart: always

  nginx:
    image: nginx:1.27-alpine
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    # Plain-HTTP app entry: TLS is terminated by Traefik in front of nginx, so
    # no certs/443 here. Behind Traefik, route traefik -> nginx:80 over the app
    # network (add Traefik router/service labels per your setup); the published
    # port below is only for direct testing.
    ports:
      - "${GATEWAY_EDGE_PORT:-8090}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

volumes:
  redis-data:
  rabbitmq-data:
  analytics-models:

networks:
  app-network:
    driver: bridge
