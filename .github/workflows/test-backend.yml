name: Test Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    # Safety net: DB-integration tests skip when the database is unreachable
    # (connection refused is instant on Linux). If that ever regresses into a
    # hang, fail fast instead of burning a full-length runner slot.
    timeout-minutes: 20
    env:
      # Optional PAT (gist scope) used only to publish the coverage badge on
      # pushes to master. Absent on forks/PRs — the badge step is skipped then.
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Each service is its own uv-workspace package with its own `src`, so the
      # suites run one package at a time (a single pytest over all of them would
      # collide on the duplicate top-level `src`). Integration tests that need a
      # seeded database probe the connection and skip when it is unreachable, so
      # no Postgres/Redis/RabbitMQ services are required here — unit and
      # validation tests run, DB-integration tests skip cleanly.
      - name: Run backend test suites (with coverage)
        working-directory: backend
        run: |
          set -e
          for svc in shared app-service parser-service balancer-service tournament-service analytics-service identity-service discord-service; do
            if [ "$svc" = "shared" ]; then src="shared"; else src="$svc/src"; fi
            echo "::group::pytest $svc"
            uv run coverage run --parallel-mode --source="$src" -m pytest "$svc/tests"
            echo "::endgroup::"
          done
          uv run coverage combine
          uv run coverage report
          uv run coverage json -o coverage.json
      - name: Compute coverage percentage
        id: cov
        if: ${{ github.event_name == 'push' }}
        working-directory: backend
        run: |
          pct=$(uv run python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
      # Publishes the shields.io endpoint JSON to the coverage gist. Runs only on
      # master pushes and only when the GIST_TOKEN secret is configured, so PRs
      # and un-configured repos stay green.
      - name: Publish coverage badge to gist
        if: ${{ github.event_name == 'push' && env.GIST_TOKEN != '' }}
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: e00b7692443a542b0e505c090cf83d35
          filename: owt-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90
      - name: Store coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: backend/coverage.json
          if-no-files-found: ignore
