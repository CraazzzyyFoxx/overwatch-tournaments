name: Lint Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: production
      APP_PORT: ${{ secrets.APP_PORT }}
      TRAEFIK_PORT: ${{ secrets.TRAEFIK_PORT }}
      USERNAME: ${{ secrets.USERNAME }}
      HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}

      NEXT_API_URL: ${{ secrets.NEXT_API_URL }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CACHE_POLICY: ${{ secrets.NEXT_PUBLIC_CACHE_POLICY }}

      PROJECT_URL: ${{ secrets.PROJECT_URL }}

      REDIS_URL: ${{ secrets.REDIS_URL }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

      SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
      SUPERUSER_PASSWORD: ${{ secrets.SUPERUSER_PASSWORD }}
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}

      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

      CHALLONGE_API_KEY: ${{ secrets.CHALLONGE_API_KEY }}
      CHALLONGE_USERNAME: ${{ secrets.CHALLONGE_USERNAME }}

      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.15"
          enable-cache: true
      - run: uv run bash scripts/lint.sh
        working-directory: backend

  lint-tournament-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.15"
          enable-cache: true
      - name: Ruff check tournament-service
        run: uv run ruff check tournament-service/main.py tournament-service/serve.py tournament-service/src tournament-service/tests
        working-directory: backend
      - name: Ruff format check tournament-service
        run: uv run ruff format --check tournament-service/main.py tournament-service/serve.py tournament-service/src tournament-service/tests
        working-directory: backend
