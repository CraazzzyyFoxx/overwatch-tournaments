[tool.uv]
dev-dependencies = [
    "pytest<8.0.0,>=7.4.3",
    "mypy<2.0.0,>=1.8.0",
    "ruff<1.0.0,>=0.2.2",
    "pre-commit<4.0.0,>=3.6.2",
    "types-passlib<2.0.0.0,>=1.7.7.20240106",
    "coverage<8.0.0,>=7.4.3",
    "import-linter>=2.0",
]

[tool.uv.workspace]
members = ["shared", "app-service", "identity-service", "discord-service", "parser-service", "balancer-service", "tournament-service", "analytics-service"]

[tool.uv.sources]
shared = { workspace = true }

[tool.mypy]
strict = true
exclude = ["venv", ".venv", "alembic"]

[tool.ty.environment]
# Point ty at the workspace venv so it resolves `shared` (editable install)
# and all third-party packages.
python = ".venv"
python-version = "3.13"
# Roots for import resolution:
# - "." so `shared/` resolves as `shared`
# - each service dir so `from src.xxx` works inside that service
root = [
    ".",
    "app-service",
    "identity-service",
    "parser-service",
    "tournament-service",
    "balancer-service",
    "discord-service",
    "analytics-service",
]
extra-paths = [
    ".",
    "app-service",
    "identity-service",
    "parser-service",
    "tournament-service",
    "balancer-service",
    "discord-service",
    "analytics-service",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["alembic"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
#    "ARG001", # unused arguments in functions
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "W191",  # indentation contains tabs
    "B904",  # Allow raising exceptions without from e, for HTTPException
    "F403", # 'from module import *' used; unable to detect undefined names
    "F405", # may be undefined, or defined from star imports (companion to F403; aggregators re-export via `*`)
    "UP046", # non-pep695 generic class — hold off on PEP 695 syntax (pydantic generics)
    "UP047", # non-pep695 generic function — hold off on PEP 695 syntax
]

[tool.ruff.lint.per-file-ignores]
# Test modules legitimately set env vars / sys.path before importing app code.
"**/tests/**" = ["E402"]
# Aggregator __init__.py files re-export via `*` in a hand-crafted dependency
# order (e.g. `hero` before `achievement`, which consumes `HeroRead`). Import
# sorting (I001) would reorder them alphabetically and break circular-import
# avoidance, and re-exports look like unused imports (F401).
"**/__init__.py" = ["I001", "F401"]

[tool.ruff.lint.pyupgrade]
# Preserve types, even if a file imports `from __future__ import annotations`.
keep-runtime-typing = true

[tool.ruff.lint.isort]
# Treat these as first-party so `shared.*` isn't grouped with stdlib/third-party.
known-first-party = ["shared", "src"]

[tool.coverage.run]
# Per-service suites run with --parallel-mode + --source, then `coverage combine`
# merges them. relative_files keeps paths portable across the matrix/checkout.
relative_files = true
omit = [
    "*/tests/*",
    "*/alembic/*",
    "*/.venv/*",
    "*/migrations/*",
    "*/scripts/*",
]

[tool.coverage.report]
show_missing = false

