[tool.uv]
dev-dependencies = [
    "pytest<8.0.0,>=7.4.3",
    "mypy<2.0.0,>=1.8.0",
    "ruff<1.0.0,>=0.2.2",
    "pre-commit<4.0.0,>=3.6.2",
    "types-passlib<2.0.0.0,>=1.7.7.20240106",
    "coverage<8.0.0,>=7.4.3",
]

[tool.uv.workspace]
members = ["shared", "app-service", "auth-service", "discord-service", "parser-service", "realtime-service", "twitch-service", "balancer-service", "tournament-service", "analytics-service", "mixtura-balancer-tournament"]

[tool.uv.sources]
shared = { workspace = true }

[tool.mypy]
strict = true
exclude = ["venv", ".venv", "alembic"]

[tool.ty.environment]
# Point ty at the workspace venv so it resolves `shared` (editable install)
# and all third-party packages.
python = ".venv"
python-version = "3.13"
# Roots for import resolution:
# - "." so `shared/` resolves as `shared`
# - each service dir so `from src.xxx` works inside that service
root = [
    ".",
    "app-service",
    "auth-service",
    "parser-service",
    "realtime-service",
    "tournament-service",
    "balancer-service",
    "discord-service",
    "twitch-service",
    "analytics-service",
]
extra-paths = [
    ".",
    "app-service",
    "auth-service",
    "parser-service",
    "realtime-service",
    "tournament-service",
    "balancer-service",
    "discord-service",
    "twitch-service",
    "analytics-service",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["alembic", "app/src/schemas/__init__.py", "app/src/models/__init__.py"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
#    "ARG001", # unused arguments in functions
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "W191",  # indentation contains tabs
    "B904",  # Allow raising exceptions without from e, for HTTPException
    "F403", # 'from module import *' used; unable to detect undefined names
]

[tool.ruff.lint.pyupgrade]
# Preserve types, even if a file imports `from __future__ import annotations`.
keep-runtime-typing = true

[tool.ruff.lint.isort]
# Treat these as first-party so `shared.*` isn't grouped with stdlib/third-party.
known-first-party = ["shared", "src"]

