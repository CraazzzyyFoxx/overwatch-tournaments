services:
  postgres:
    profiles: ["db"]
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-aqt_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aqt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M

  backend:
    image: registry.craazzzyyfoxx.me/aqt-backend:dev
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop --reload --reload-delay 5 --reload-dir /app/app-service --reload-dir /app/shared
    ports:
      - "8000:8000"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ss-local:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app-service:/app/app-service
      - ./backend/shared:/app/shared
      - ./logs/backend:/logs
      - ./backend/htmlcov:/app/htmlcov
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  auth:
    image: registry.craazzzyyfoxx.me/aqt-auth:dev
    build:
      context: ./backend
      args:
        APP_PATH: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --loop uvloop --reload --reload-delay 5 --reload-dir /app/auth-service --reload-dir /app/shared
    ports:
      - "8001:8001"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - 'SERVICE_CLIENTS=${SERVICE_CLIENTS:-{"discord-service":"dev-discord-service-secret"}}'
      - 'SERVICE_SCOPES=${SERVICE_SCOPES:-{"discord-service":["parser:logs"]}}'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ss-local:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./backend/auth-service:/app/auth-service
      - ./backend/shared:/app/shared
      - ./logs/auth:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  parser:
