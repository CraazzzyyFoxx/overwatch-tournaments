name: owt

services:
  postgres:
    profiles: ["db"]
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-aqt_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aqt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      # Dev-only: allow the default guest user to authenticate from other
      # containers (rabbitmq-exporter). Prod uses non-guest credentials.
      - ./monitoring/rabbitmq/dev-loopback.conf:/etc/rabbitmq/conf.d/10-dev-monitoring.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M

  # Headless RPC worker for app-service: serves ALL of /api/v1/core (rpc.app.*
  # reads/writes/binary) behind the gateway + owns the tournament_changed
  # cache-invalidation consumer. Replaces the former HTTP `backend` service.
  app-svc:
    image: registry.craazzzyyfoxx.me/aqt-app:dev
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: faststream run serve:app --reload --reload-dir /app/app-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9109
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./backend/app-service:/app/app-service
      - ./backend/shared:/app/shared
      - ./logs/app-svc:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # parser-service HTTP decommissioned: parser is now a headless FastStream worker
  # (parser-svc below), serving its unique domains (match-log, OverFast rank,
  # achievement engine + rules admin, metadata sync, settings, discord-channel,
  # bootstrap importers) as typed RPC behind the gateway. The bot uploads logs
  # over RabbitMQ; the SSE log monitor moved to the gateway WS hub.

  # realtime-service decommissioned: WebSockets are now served by the Go gateway
  # (gateway/internal/ws), which consumes the same `realtime:*` Redis channels and
  # replays from `realtime.workspace_event`. The frontend connects same-origin to
  # `/api/realtime/ws` (nginx -> gateway:8080). Service code kept under
  # backend/realtime-service/ as reference (not deployed).

  # balancer-service HTTP decommissioned: /api/balancer is served by the headless
  # balancer-svc (rpc.balancer.* config/admin/draft/jobs) behind the gateway.
  # The worker also consumes the balancer job queue + runs the draft clock + Rust
  # moo_core. The dead SSE job-stream endpoint was removed (progress flows over the
  # tournament:{id}:balancer WS topic).

  parser-svc:
    image: registry.craazzzyyfoxx.me/aqt-parser:dev
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: faststream run serve:app --reload --reload-dir /app/parser-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/parser.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9100
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./backend/parser-service:/app/parser-service
      - ./backend/shared:/app/shared
      - ./logs/parser-svc:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  tournament-svc:
    image: registry.craazzzyyfoxx.me/aqt-tournament:dev
    build:
      context: ./backend
      args:
        APP_PATH: tournament
    command: faststream run serve:app --reload --reload-dir /app/tournament-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/tournament.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9103
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/tournament-service:/app/tournament-service
      - ./backend/shared:/app/shared
      - ./logs/tournament-svc:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  balancer-svc:
    image: registry.craazzzyyfoxx.me/aqt-balancer:dev
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: faststream run serve:app --reload --reload-dir /app/balancer-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9100
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/balancer-service:/app/balancer-service
      - ./backend/shared:/app/shared
      - ./logs/balancer-svc:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # analytics-service HTTP decommissioned: /api/analytics is served by the
  # lightweight headless analytics-svc (rpc.analytics.* reads + job-control) behind
  # the gateway; heavy ML compute stays in analytics-worker (job queues).

  analytics-worker:
    image: registry.craazzzyyfoxx.me/aqt-analytics:dev
    profiles: ["workers"]
    build:
      context: ./backend
      args:
        APP_PATH: analytics
    command: faststream run serve:app --reload --reload-dir /app/analytics-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/analytics.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9106
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/analytics-service:/app/analytics-service
      - ./backend/shared:/app/shared
      - ./backend/.cache/analytics:/cache/analytics
      - analytics-models:/opt/anak/models
      - ./logs/analytics-worker:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Lightweight headless RPC service: hosts every rpc.analytics.* subscriber
  # (reads + job-control) for the gateway. The heavy ML compute stays in
  # analytics-worker; this process must NOT own the ANALYTICS_* job queues.
  analytics-svc:
    image: registry.craazzzyyfoxx.me/aqt-analytics:dev
    build:
      context: ./backend
      args:
        APP_PATH: analytics
    command: faststream run serve_rpc:app --reload --reload-dir /app/analytics-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/analytics.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9107
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/analytics-service:/app/analytics-service
      - ./backend/shared:/app/shared
      - ./logs/analytics-svc:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  discord-worker:
    image: registry.craazzzyyfoxx.me/aqt-discord:dev
    profiles: ["workers"]
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: watchfiles --filter python "python main.py" /app/discord-service /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/discord.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - WORKER_METRICS_PORT=9100
      - SERVICE_CLIENT_ID=${DISCORD_SERVICE_CLIENT_ID:-discord-service}
      - SERVICE_CLIENT_SECRET=${DISCORD_SERVICE_CLIENT_SECRET:-dev-discord-service-secret}
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=5000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proxy:
        condition: service_healthy
    volumes:
      - ./backend/discord-service:/app/discord-service
      - ./backend/shared:/app/shared
      - ./logs/discord-worker:/logs
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  frontend:
    image: registry.craazzzyyfoxx.me/frontend:dev
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DOCKER=1
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CACHE_POLICY=${NEXT_PUBLIC_CACHE_POLICY}
      # Single gateway origin: the browser uses relative same-origin paths
      # (/api/v1, /api/balancer, /api/analytics, /api/auth, /api/realtime/ws).
      # Only server-side (SSR + route handlers + middleware) fetches need a base.
      - NEXT_INTERNAL_API_URL=${NEXT_INTERNAL_API_URL:-http://gateway:8080}
    depends_on:
      gateway:
        condition: service_started
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend-node-modules:/app/node_modules
      - ./logs/frontend:/logs
    tmpfs:
      - /app/.next:size=512M
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/bun.lock
          action: rebuild
        - path: ./frontend/next.config.mjs
          action: sync
          target: /app/next.config.mjs
        - path: ./frontend/tailwind.config.ts
          action: sync
          target: /app/tailwind.config.ts
        - path: ./frontend/tsconfig.json
          action: sync
          target: /app/tsconfig.json
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  proxy:
    image: teddysun/xray:latest
    restart: unless-stopped
    command: ["xray", "run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./proxy/xray.json:/etc/xray/config.json:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-config", "/etc/xray/config.json"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  # --------------------------------------------------------------------------
  # identity-svc (headless FastStream) — Phase 1: identity RPC over RabbitMQ.
  # Headless worker (no HTTP), called by the gateway. Part of the default dev
  # stack so a plain `docker compose up -d --build` brings everything up.
  # --------------------------------------------------------------------------
  identity-svc:
    image: registry.craazzzyyfoxx.me/aqt-identity:dev
    build:
      context: ./backend
      args:
        APP_PATH: identity
    command: faststream run serve:app --reload --reload-dir /app/identity-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/identity.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/identity-service:/app/identity-service
      - ./backend/shared:/app/shared
      - ./logs/identity-svc:/logs
    networks:
      - app-network
    # Headless worker: no HTTP server, so the image's HTTP healthcheck does not apply.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # --------------------------------------------------------------------------
  # Gateway (Go) — REST reverse-proxy + WebSocket hub + local JWT.
  # Sole entry point (Kong removed): nginx (APP_PORT) -> gateway:8080 -> RPC.
  # The gateway is also published on :8080 for direct testing.
  # --------------------------------------------------------------------------
  gateway:
    image: registry.craazzzyyfoxx.me/aqt-gateway:dev
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
      - ./backend/env/gateway.env
    volumes:
      # Structured JSON logs tailed by Promtail into Loki (LOG_FILE=/logs/gateway.log).
      - ./logs/gateway:/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

  # nginx: plain-HTTP app entry in front of the gateway (gateway keeps routing
  # REST + WS). Single upstream -> gateway:8080. TLS is terminated upstream
  # (Traefik in prod), not here. Sole external edge (Kong removed). Binds
  # APP_PORT so the frontend dev env (http://localhost/api/...) works unchanged.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  # --------------------------------------------------------------------------
  # Monitoring (start with: docker compose --profile monitoring up -d)
  # --------------------------------------------------------------------------

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      # Tempo's metrics_generator pushes span-metrics / service-graph series here.
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    networks:
      - app-network

  rabbitmq-exporter:
    profiles: ["monitoring"]
    image: kbudde/rabbitmq-exporter:1.0.0-RC19
    restart: unless-stopped
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: "${RABBITMQ_DEFAULT_USER:-guest}"
      RABBIT_PASSWORD: "${RABBITMQ_DEFAULT_PASS:-guest}"
      RABBIT_CAPABILITIES: "bert,no_sort"
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "TTY"
      SKIP_QUEUES: "^$"
      INCLUDE_QUEUES: ".*"
    ports:
      - "9419:9419"
    networks:
      - app-network

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - app-network

  tempo:
    profiles: ["monitoring"]
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - app-network

  otel-collector:
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:0.111.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector/config.yml"]
    volumes:
      - ./monitoring/otel/otel-collector.yml:/etc/otel-collector/config.yml:ro
    depends_on:
      - tempo
    networks:
      - app-network

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/var/log/app:ro
    networks:
      - app-network
    depends_on:
      - loki

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3001}"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/logs.json"
      TEMPO_URL: "${TEMPO_URL:-http://tempo:3200}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - app-network
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  analytics-models:
  frontend-node-modules:
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data:

networks:
  app-network:
    driver: bridge
