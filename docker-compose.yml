      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --loop uvloop --reload --reload-delay 5 --reload-dir /app/parser-service --reload-dir /app/shared
    ports:
      - "8002:8002"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/parser.env
    environment:
