# Defaults for `locust` runs from this directory. Every value can be
# overridden on the CLI (e.g. `locust --headless -u 200 -r 20 -t 10m`).
locustfile = locustfile.py

# nginx edge of the dev stack (APP_PORT=80 in .env). Point at staging/prod
# with --host or LOCUST_HOST.
host = http://localhost

users = 50
spawn-rate = 5
