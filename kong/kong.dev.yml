_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://gateway:8080
    routes:
      - name: auth-api
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true

  - name: parser
    url: http://parser:8002
    routes:
      - name: parser-api
        paths:
          - /api/parser
        strip_path: false
        preserve_host: true

  - name: balancer
    url: http://balancer:8003
    connect_timeout: 5000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: balancer-api
        paths:
          - /api/balancer
        strip_path: false
        preserve_host: true

  - name: tournament
    url: http://gateway:8080
    routes:
      - name: tournament-v1-api
        # The gateway owns the whole /api/v1 namespace (tournament-worker for
        # /api/v1/*, app-worker for /api/v1/core/*) via typed RPC. No separate
        # app-service route — /api/v1/core flows here -> gateway:8080.
        paths:
          - /api/v1
        strip_path: false
        preserve_host: true

  - name: analytics
    url: http://analytics:8006
    routes:
      - name: analytics-api
        paths:
          - /api/analytics
        strip_path: false
        preserve_host: true

  # WebSockets are served by the Go gateway (realtime-service decommissioned).
  # strip_path drops `/api/realtime`, so the gateway receives `/ws` (which it serves
  # alongside `/api/realtime/ws`). Same gateway:8080 target as auth/tournament above.
  - name: realtime
    url: http://gateway:8080
    routes:
      - name: realtime-api
        paths:
          - /api/realtime
        strip_path: true
        preserve_host: true

  # app-service decommissioned: /api/v1/core/* is now served by the gateway's
  # typed RPC routes (app-worker), reached via the `tournament` /api/v1 route
  # above (-> gateway:8080). No separate backend service/route.

  - name: frontend
    url: http://host.docker.internal:3000
    routes:
      - name: frontend-web
        paths:
          - /
        strip_path: false
        preserve_host: true
      - name: frontend-api-account
        paths:
          - /api/account
        strip_path: false
        preserve_host: true
