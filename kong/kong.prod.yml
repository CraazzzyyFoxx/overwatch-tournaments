_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:8001
    routes:
      - name: auth-api
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true

  - name: parser
    url: http://parser:8002
    routes:
      - name: parser-api
        paths:
          - /api/parser
        strip_path: false
        preserve_host: true

  - name: balancer
    url: http://balancer:8003
    connect_timeout: 5000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: balancer-api
        paths:
          - /api/balancer
        strip_path: false
        preserve_host: true

  - name: tournament
    url: http://tournament:8004
    routes:
      - name: tournament-api
        paths:
          - /api/tournament
        strip_path: false
        preserve_host: true

  - name: analytics
    url: http://analytics:8006
    routes:
      - name: analytics-api
        paths:
          - /api/analytics
        strip_path: false
        preserve_host: true

  - name: realtime
    url: http://realtime:8005
    routes:
      - name: realtime-api
        paths:
          - /api/realtime
        strip_path: true
        preserve_host: true

  - name: backend
    url: http://backend:8000
    routes:
      - name: backend-api
        paths:
          - /api
        strip_path: false
        preserve_host: true

  - name: frontend
    url: http://frontend:3000
    routes:
      - name: frontend-web
        paths:
          - /
        strip_path: false
        preserve_host: true
      - name: frontend-api-account
        paths:
          - /api/account
        strip_path: false
        preserve_host: true
