# Edge reverse-proxy in front of the Go gateway.
#
# Role split: nginx terminates TLS / handles commodity edge concerns (gzip,
# timeouts, forwarded headers); the Go gateway owns REST routing + the stateful
# WebSocket hub. Everything is proxied to a single upstream (the gateway).

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile   on;
    tcp_nopush on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # WebSocket upgrade plumbing: echoes the Upgrade header, or "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream gateway {
        server gateway:8080;
        keepalive 32;
    }

    # Shared proxy settings (re-included per server block).
    # NOTE: kept inline below rather than in a separate file to keep this config
    # self-contained as the single mounted nginx.conf.

    # ---- HTTP edge (dev). In prod, terminate TLS in the 443 block below. ----
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://gateway;
            proxy_http_version 1.1;

            # WebSocket upgrade (no-op for ordinary HTTP requests).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts: live WebSockets + long balancer ops (Kong allowed 120s).
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }
    }

    # ---- TLS edge (prod): mount certs into /etc/nginx/certs and uncomment. ----
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name your.domain.example;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://gateway;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade    $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 3600s;
    #         proxy_send_timeout 3600s;
    #         proxy_buffering    off;
    #     }
    # }
}
