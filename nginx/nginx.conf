# Application entry reverse-proxy in front of the Go gateway.
#
# This is the app's internal HTTP edge: nginx -> gateway (REST proxy + WS hub).
# TLS is NOT terminated here — Traefik sits in front of nginx and handles
# certificates. nginx serves plain HTTP and forwards the original
# scheme / host / client IP it receives from Traefik.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile   on;
    tcp_nopush on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # WebSocket upgrade plumbing: echoes the Upgrade header, or "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Preserve the original scheme from the TLS terminator (Traefik). Falls back
    # to nginx's own scheme if nothing upstream set the header.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Re-resolve the gateway container's IP at runtime via Docker's embedded DNS,
    # instead of a static `upstream`/`server` that nginx resolves once at config
    # load. Recreating the gateway container gives it a new IP; with a cached IP
    # nginx returned 502 until it was restarted. A variable in proxy_pass (below)
    # forces per-request resolution honoring this resolver's TTL.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        location / {
            # Hostname in a variable → nginx resolves it per request (see resolver
            # above), so a recreated gateway container is picked up without an nginx
            # restart. With no URI after the port, the original request URI (incl.
            # query string) is passed through unchanged, matching the previous
            # `proxy_pass http://gateway`.
            set $gateway_upstream gateway;
            proxy_pass http://$gateway_upstream:8080;
            proxy_http_version 1.1;

            # WebSocket upgrade (no-op for ordinary HTTP requests).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward the original client identity / scheme (TLS ends at Traefik).
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Long timeouts: live WebSockets + long balancer ops (Kong allowed 120s).
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }
    }
}
