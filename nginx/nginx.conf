# Application entry reverse-proxy in front of the Go gateway.
#
# This is the app's internal HTTP edge: nginx -> gateway (REST proxy + WS hub).
# TLS is NOT terminated here — Traefik sits in front of nginx and handles
# certificates. nginx serves plain HTTP and forwards the original
# scheme / host / client IP it receives from Traefik.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile   on;
    tcp_nopush on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Access log WITHOUT the query string: the WebSocket endpoint carries the JWT
    # as ?token=..., and the default "combined" format logs $request (which
    # includes the query). Log the method + normalized path ($uri) only so tokens
    # never land in the logs.
    log_format edge '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log edge;

    # Coarse anti-brute-force / anti-flood limit for the auth endpoints, keyed by
    # client IP. Defense-in-depth to the gateway's own per-IP token bucket; the
    # generous burst keeps ordinary logins from being throttled.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_status 429;

    # WebSocket upgrade plumbing: echoes the Upgrade header, or "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Preserve the original scheme from the TLS terminator (Traefik). Falls back
    # to nginx's own scheme if nothing upstream set the header.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Re-resolve the gateway container's IP at runtime via Docker's embedded DNS,
    # instead of a static `upstream`/`server` that nginx resolves once at config
    # load. Recreating the gateway container gives it a new IP; with a cached IP
    # nginx returned 502 until it was restarted. A variable in proxy_pass (below)
    # forces per-request resolution honoring this resolver's TTL.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Bound the request body by default; large upload endpoints raise it below.
        # Aligns with the gateway/edge 12 MiB in-memory body cap.
        client_max_body_size 12m;

        # Hostname in a variable → nginx resolves it per request (see resolver
        # above), so a recreated gateway container is picked up without an nginx
        # restart.
        set $gateway_upstream gateway;

        # Shared proxy config, inherited by every location that does not define its
        # own proxy_set_header (none below do). proxy_pass stays per-location
        # because it uses the runtime-resolved $gateway_upstream variable.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_buffering off;
        # Bounded upstream timeouts (was 3600s on every request). 180s leaves
        # margin over the gateway's 120s RPC ceiling for the slowest cold-cache
        # reads. The long-lived WebSocket endpoints override these below.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        # WebSocket endpoints: keep the long timeout so idle live connections and
        # long balancer streams are not cut off. proxy_read_timeout does not accept
        # a variable, so these get their own exact-match locations.
        location = /ws {
            proxy_pass http://$gateway_upstream:8080;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location = /api/realtime/ws {
            proxy_pass http://$gateway_upstream:8080;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Auth endpoints: rate-limited (see auth_limit zone above).
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://$gateway_upstream:8080;
        }

        # Match-log / balancer-export uploads legitimately exceed the default body
        # cap (parser accepts up to 50 MiB); raise it just for these two paths.
        location = /api/v1/admin/logs/upload {
            client_max_body_size 60m;
            proxy_pass http://$gateway_upstream:8080;
        }
        location = /api/v1/teams/create/balancer {
            client_max_body_size 60m;
            proxy_pass http://$gateway_upstream:8080;
        }

        location / {
            # With no URI after the port, the original request URI (incl. query
            # string) is passed through unchanged, matching the previous
            # `proxy_pass http://gateway`.
            proxy_pass http://$gateway_upstream:8080;
        }
    }
}
